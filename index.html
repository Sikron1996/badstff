<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bad Stuff</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="paper-bg"></div>

<main class="page">
  <section class="mint-card">
    <div class="art">
      <img src="assets/bad-stuff-cover.jpg" alt="Bad Stuff">
    </div>

    <div class="panel">
      <p class="tag">ERC721 · LIVE MINT</p>
      <h1>BAD<br>STUFF</h1>
      <p class="desc">Bad Stuff is a collection of 10000 Hand drawn unique NFTs that can be used to earn rewards..</p>

      <div class="stats">
        <div><span>MINTED</span><b><span id="mintedText">0</span> / 10000</b></div>
        <div><span>TOTAL</span><b id="totalPrice">FREE</b></div>
      </div>

      <div class="counter">
        <button id="minus" type="button">−</button>
        <input id="amount" value="1" inputmode="numeric">
        <button id="plus" type="button">+</button>
      </div>

      <button id="connectBtn" class="main-btn" type="button">CONNECT WALLET</button>
      <button id="mintBtn" class="main-btn hiddenBtn" type="button">MINT BAD STUFF</button>

      <p id="wallet">not connected</p>
      <p id="status"></p>

      <div class="links">
        <a href="https://opensea.io/collection/bad-stuff" target="_blank">OpenSea</a>
        <a href="https://x.com/" target="_blank">X</a>
        <a href="https://etherscan.io/address/0x458ee562ddd3c04a3492d769146b97122cc7bcce#writeContract#F2" target="_blank">Etherscan</a>
      </div>
    </div>
  </section>
</main>

<button id="topConnect" class="float-connect">Connect</button>

<div id="walletModal" class="modal hidden">
  <div class="modal-card">
    <button id="closeModalBtn" class="close" type="button">×</button>
    <h3>Connect Wallet</h3>
    <button id="browserWalletBtn" type="button">MetaMask / Rabby / OKX</button>
    <button id="walletConnectBtn" type="button">WalletConnect / Mobile</button>
  </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
